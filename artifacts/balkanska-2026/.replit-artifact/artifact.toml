kind = "web"
previewPath = "/"
title = "Pętla Bałkańska 2026"
version = "1.0.0"
id = "artifacts/balkanska-2026"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21008

[services.development]
run = "pnpm --filter @workspace/balkanska-2026 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/balkanska-2026", "run", "build" ]
publicDir = "artifacts/balkanska-2026/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21008"
BASE_PATH = "/"
